<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>JUMP予想</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root { 
      --ios-blue: #007aff; 
      --ios-bg: #e5e5ea; /* 画像に合わせた薄いグレー */
      --ios-card: #ffffff;
      --header-blue: #007aff;
      --nav-dark: #1c1c1e;
      --pill-bg: rgba(255, 255, 255, 0.2);
    }
    
    body { font-family: -apple-system, sans-serif; background: var(--ios-bg); margin: 0; padding-bottom: 90px; color: #000; overflow-x: hidden; }
    .hidden { display: none !important; }

    /* ヘッダー: 画像の「のじを。さん」ピル型を再現 */
    header {
      background: var(--header-blue); padding: 15px; text-align: center;
      position: sticky; top: 0; z-index: 1000; height: 60px;
      display: flex; justify-content: center; align-items: center;
    }
    .user-pill {
      background: var(--pill-bg); color: white; padding: 8px 40px; border-radius: 50px;
      border: 2px solid white; font-size: 1.1rem; font-weight: bold; min-width: 150px;
    }

    /* ボトムナビ: 黒背景に青のハイライト */
    .bottom-nav {
      position: fixed; bottom: 0; width: 100%; height: 75px;
      background: var(--nav-dark); display: flex; justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid #333; z-index: 2000;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #8e8e93; font-size: 11px; font-weight: bold; cursor: pointer;
    }
    .nav-item.active { color: var(--ios-blue); }
    .nav-icon { font-size: 24px; margin-bottom: 2px; }

    /* コンテンツエリア */
    .page { display: none; padding: 15px; box-sizing: border-box; }
    .page.active { display: block; }

    /* サブナビ（LeagueやData内の切り替え）: 画像の黒背景ボタン */
    .sub-tabs {
      background: var(--nav-dark); display: flex; padding: 8px; margin: -15px -15px 15px -15px;
      justify-content: space-around;
    }
    .sub-tab-btn {
      color: #8e8e93; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; cursor: pointer;
    }
    .sub-tab-btn.active { background: var(--ios-blue); color: white; }

    /* Homeのカード: 丸い角と青枠 */
    .card-ios {
      background: white; border-radius: 40px; padding: 25px; margin-bottom: 15px;
      border: 1px solid #b2d7ff; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .info-box { background: #cfe4ff; border-radius: 35px; min-height: 150px; padding: 20px; margin-bottom: 20px; color: #333; }

    /* My Pageのリスト形式 */
    .list-group-title { padding-left: 15px; margin-bottom: 5px; font-size: 0.85rem; color: #6e6e73; }
    .list-group { background: #dcdcdc; border-radius: 0; margin-bottom: 25px; overflow: hidden; }
    .list-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 15px; border-bottom: 1px solid #c7c7cc; background: #e5e5ea;
    }
    .list-row:last-child { border-bottom: none; }
    .list-label { font-weight: 500; font-size: 1rem; }
    .list-val { color: #8e8e93; font-size: 1rem; display: flex; align-items: center; }
    .arrow { margin-left: 10px; font-weight: bold; font-family: monospace; }

    /* ボタン類 */
    .btn-submit { background: var(--ios-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 1rem; margin-top: 15px; }
    .btn-logout {
      background: white; color: #ff3b30; border: 2px solid #ff3b30;
      padding: 10px 60px; border-radius: 50px; font-weight: bold; font-size: 1.2rem;
      display: block; margin: 30px auto;
    }

    /* テーブル共通 */
    .table-container { overflow-x: auto; background: white; border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    .color-top { background: #ffcccc; font-weight: bold; }
    .color-center { background: #fff3cd; font-weight: bold; }

    /* ソートアイテム */
    .sort-item { background: white; margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; align-items: center; border: 1px solid #ddd; }
    .rank-tag { width: 30px; font-weight: bold; color: var(--ios-blue); }
    .drag-handle { margin-left: auto; color: #ccc; }
  </style>
</head>
<body>

<header>
  <div class="user-pill" id="displayUserName">-- さん</div>
</header>

<div id="app-content">
  <div id="page-home" class="page active">
    <div class="card-ios">
      <div class="info-box" id="newsText">ここにお知らせを表示します。</div>
      <div style="text-align:center;">
        <h2 id="homeIssue" style="margin:0;">--号</h2>
        <h1 id="homeStatus" style="color:#ff3b30; margin:10px 0;">--</h1>
        <div style="border-top:1px solid #ddd; padding-top:10px; font-size:0.9rem;" id="homeEvent"></div>
      </div>
    </div>
  </div>

  <div id="page-league" class="page">
    <div class="sub-tabs">
      <div class="sub-tab-btn active" onclick="switchLeagueSub('predict', this)">予想提出</div>
      <div class="sub-tab-btn" onclick="switchLeagueSub('event', this)">予選参加</div>
    </div>
    <div id="sub-league-predict">
      <div id="sortContainer">読み込み中...</div>
      <button class="btn-submit" onclick="onSavePredict()">予想を送信する</button>
    </div>
    <div id="sub-league-event" class="hidden">
      <div class="card-ios" id="eventContent" style="text-align:center;">現在募集中のイベントはありません。</div>
    </div>
  </div>

  <div id="page-data" class="page">
    <div class="sub-tabs">
      <div class="sub-tab-btn active" onclick="switchDataSub('stats', this)">8週統計</div>
      <div class="sub-tab-btn" onclick="switchDataSub('past', this)">8週掲載順</div>
      <div class="sub-tab-btn" onclick="switchDataSub('everyone', this)">みんなの予想</div>
    </div>
    <div id="sub-data-stats" class="table-container"><table><thead id="statsHead"></thead><tbody id="statsBody"></tbody></table></div>
    <div id="sub-data-past" class="table-container hidden"><table><thead id="pastHead"></thead><tbody id="pastBody"></tbody></table></div>
    <div id="sub-data-everyone" class="table-container hidden" id="everyoneArea"></div>
  </div>

  <div id="page-qna" class="page">
    <div class="card-ios">
      <h3 style="margin-top:0;">お問い合わせ</h3>
      <select id="qCategory" style="width:100%; padding:10px; border-radius:10px; margin-bottom:10px;">
        <option>機能に関して</option><option>不具合報告</option><option>その他</option>
      </select>
      <textarea id="qContent" rows="8" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;" placeholder="内容を入力してください"></textarea>
      <button class="btn-submit" onclick="onSendInquiry()">送信する</button>
    </div>
  </div>

  <div id="page-mypage" class="page">
    <div class="list-group-title">ユーザー情報</div>
    <div class="list-group">
      <div class="list-row"><span class="list-label">ユーザー名</span><span class="list-val" id="infoName">--<span class="arrow">></span></span></div>
      <div class="list-row"><span class="list-label">ユーザーID</span><span class="list-val" id="infoId">--<span class="arrow">></span></span></div>
      <div class="list-row"><span class="list-label">パスワード</span><span class="list-val">********<span class="arrow">></span></span></div>
      <div class="list-row"><span class="list-label">秘密のキーワード</span><span class="list-val" id="infoHint">--<span class="arrow">></span></span></div>
    </div>
    <div class="list-group-title">個人成績</div>
    <div class="list-group">
      <div class="list-row" onclick="switchTab('page-scores', null)">
        <span class="list-label">過去の成績</span><span class="list-val"><span class="arrow">></span></span>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">ログアウト</button>
  </div>

  <div id="page-scores" class="page">
    <button onclick="switchTab('page-mypage', null)" style="background:none; border:none; color:var(--ios-blue); font-weight:bold; margin-bottom:10px;">＜ 戻る</button>
    <div class="table-container"><table><thead><tr><th>年度</th><th>号数</th><th>点数</th></tr></thead><tbody id="scoreBody"></tbody></table></div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('page-home', this)"><div class="nav-icon">⌂</div><span>Home</span></div>
  <div class="nav-item" onclick="switchTab('page-league', this)"><div class="nav-icon">◪</div><span>League</span></div>
  <div class="nav-item" onclick="switchTab('page-data', this)"><div class="nav-icon">📊</div><span>Data</span></div>
  <div class="nav-item" onclick="switchTab('page-qna', this)"><div class="nav-icon">💬</div><span>Q&A</span></div>
  <div class="nav-item" onclick="switchTab('page-mypage', this)"><div class="nav-icon">👤</div><span>My Page</span></div>
</nav>

<script>
  let user = JSON.parse(localStorage.getItem('jump_user'));
  let currentData = {};
  let sortable = null;

  window.onload = () => { if(user) initApp(); else location.reload(); };

  function initApp() {
    document.getElementById('displayUserName').innerText = user.name + " さん";
    document.getElementById('infoName').innerText = user.name;
    document.getElementById('infoId').innerText = user.id;
    switchTab('page-home', document.querySelector('.nav-item'));
  }

  function switchTab(pId, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pId).classList.add('active');
    if(el) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
    }
    if(pId === 'page-home') loadHome();
    if(pId === 'page-league') loadPredict();
    if(pId === 'page-data') loadStats();
    if(pId === 'page-scores') loadScores();
  }

  function switchLeagueSub(target, el) {
    document.getElementById('sub-league-predict').classList.toggle('hidden', target !== 'predict');
    document.getElementById('sub-league-event').classList.toggle('hidden', target !== 'event');
    document.querySelectorAll('#page-league .sub-tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    if(target === 'event') loadEvent();
  }

  function switchDataSub(target, el) {
    document.getElementById('sub-data-stats').classList.toggle('hidden', target !== 'stats');
    document.getElementById('sub-data-past').classList.toggle('hidden', target !== 'past');
    document.getElementById('sub-data-everyone').classList.toggle('hidden', target !== 'everyone');
    document.querySelectorAll('#page-data .sub-tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    if(target === 'past') loadPast();
    if(target === 'everyone') loadEveryone();
  }

  // --- GAS通信系 (元のロジックを維持) ---
  function loadHome() {
    google.script.run.withSuccessHandler(data => {
      currentData = data;
      document.getElementById('newsText').innerText = data.news;
      document.getElementById('homeIssue').innerText = data.issueName;
      document.getElementById('homeStatus').innerText = data.hasSubmitted ? "提出済み" : "未提出";
      document.getElementById('homeStatus').style.color = data.hasSubmitted ? "#34c759" : "#ff3b30";
      document.getElementById('homeEvent').innerText = data.activeEvent ? data.activeEvent.name + ":" + (data.activeEvent.isParticipating ? "参加中" : "未参加") : "イベントなし";
    }).getMyPageData(user.id, user.name);
  }

  function loadPredict() {
    const container = document.getElementById('sortContainer');
    google.script.run.withSuccessHandler(data => {
      container.innerHTML = "";
      data.list.forEach((name, i) => {
        const item = document.createElement('div');
        item.className = "sort-item";
        item.dataset.name = name;
        item.innerHTML = `<span class="rank-tag">${i+1}</span><span>${name}</span><span class="drag-handle">☰</span>`;
        container.appendChild(item);
      });
      if(sortable) sortable.destroy();
      sortable = new Sortable(container, { animation: 150, handle: '.drag-handle', onEnd: () => {
        document.querySelectorAll('.rank-tag').forEach((t, idx) => t.innerText = idx + 1);
      }});
    }).getPredictionInitData(user.id, currentData.jumpId);
  }

  function onSavePredict() {
    const list = Array.from(document.getElementById('sortContainer').children).map(el => el.dataset.name);
    google.script.run.withSuccessHandler(msg => { alert(msg); loadHome(); switchTab('page-home', document.querySelector('.nav-item')); })
    .submitPrediction(user.id, currentData.jumpId, list);
  }

  function loadStats() {
    google.script.run.withSuccessHandler(data => {
      document.getElementById('statsHead').innerHTML = `<tr><th>#</th><th>作品</th>${data.issues.map(iss=>`<th>${iss.slice(-2)}</th>`).join('')}<th>平均</th></tr>`;
      document.getElementById('statsBody').innerHTML = data.stats.map(s => `<tr><td>${s.rank}</td><td style="text-align:left;">${s.title}</td>${s.ranks.map((r,i)=>`<td class="${s.colors[i]==1?'color-top':(s.colors[i]==2?'color-center':'')}">${r}</td>`).join('')}<td>${s.average}</td></tr>`).join('');
    }).getStatsTable();
  }

  function loadPast() {
    google.script.run.withSuccessHandler(data => {
      document.getElementById('pastHead').innerHTML = `<tr>${data.map(d => `<th>${d.issue}</th>`).join('')}</tr>`;
      let html = ""; for(let i=0; i<25; i++) {
        html += "<tr>" + data.map(col => `<td class="${col.top.includes(col.list[i])?'color-top':''}">${col.list[i]||''}</td>`).join('') + "</tr>";
      }
      document.getElementById('pastBody').innerHTML = html;
    }).getPastJumpsTable();
  }

  function loadScores() {
    google.script.run.withSuccessHandler(data => {
      document.getElementById('scoreBody').innerHTML = data.map(r => `<tr><td>${r.year}</td><td>${r.issue}</td><td>${r.score}</td></tr>`).join('');
    }).getPastScores(user.id);
  }

  function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
