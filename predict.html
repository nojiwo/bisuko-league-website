<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジャンプ掲載順予想</title>
    <style>
        :root {
            --main-blue: #007bff;
            --header-blue: #007bff;
            --footer-bg: #2d2d2d;
            --bg-gray: #e9e9f0;
            --text-gray: #888;
            --border-gray: #ccc;
        }

        body {
            margin: 0; padding: 0;
            font-family: sans-serif;
            background-color: var(--bg-gray);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        header { background-color: var(--header-blue); padding: 20px 0; text-align: center; flex-shrink: 0; }
        .user-badge {
            display: inline-block; background-color: #1a3c5e; color: white;
            padding: 8px 35px; border-radius: 30px; border: 2px solid white;
        }

        main { flex: 1; overflow-y: auto; position: relative; }
        .page-section { display: none; padding-bottom: 80px; }
        .page-section.active { display: block; }

        .home-container { padding: 15px; display: flex; flex-direction: column; gap: 20px; }
        .notice-card { background: white; border-radius: 12px; padding: 15px; border-left: 6px solid #ffcc00; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .notice-title { font-weight: bold; font-size: 0.9rem; color: #333; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .notice-content { font-size: 0.85rem; color: #555; line-height: 1.5; white-space: pre-wrap; }

        .status-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .status-header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; color: var(--main-blue); text-align: center; }
        .status-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem; }
        .status-label { color: #666; }
        .status-value { font-weight: bold; color: #333; }
        .status-value.ok { color: #28a745; }
        .status-value.ng { color: #dc3545; }

        .sub-nav-container {
            background-color: #333; position: relative; display: flex;
            height: 60px; padding: 0 10px; align-items: center; border-bottom: 2px solid #555;
        }
        .sub-tab {
            flex: 1; color: var(--text-gray); border: none; background: none;
            font-size: 0.9rem; z-index: 2; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 100%;
        }
        .sub-tab.active { color: white; font-weight: bold; }
        .slider {
            position: absolute; height: 34px; background-color: var(--main-blue);
            border-radius: 25px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1;
        }

        .auth-container { padding: 20px; display: flex; flex-direction: column; gap: 15px; text-align: center; }
        .auth-container input, .auth-container select, .auth-container textarea { padding: 12px; border-radius: 8px; border: 1px solid var(--border-gray); font-size: 1rem; width: 100%; box-sizing: border-box; }
        
        .pw-toggle-area { text-align: left; font-size: 0.8rem; color: #555; display: flex; align-items: center; gap: 8px; margin-top: -5px; }
        .pw-toggle-area input[type="checkbox"] { width: 18px; height: 18px; margin: 0; cursor: pointer; }

        .primary-btn { 
            background: var(--main-blue); color: white; border: none; padding: 14px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .primary-btn:disabled { background: #888; cursor: not-allowed; }

        .spinner {
            width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff; border-radius: 50%;
            animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .auth-sub-links { margin-top: 15px; display: flex; flex-direction: column; gap: 12px; font-size: 0.85rem; color: var(--main-blue); }
        .auth-sub-links span { cursor: pointer; text-decoration: underline; }

        .group-label { padding: 15px 15px 5px; font-size: 0.9rem; color: #333; font-weight: bold; }
        .list-item { background: #d9d9d9; border-bottom: 1px solid #bbb; padding: 18px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .list-item.no-arrow { cursor: default; }
        .list-item span { color: #666; font-size: 1.2rem; font-weight: bold; }
        .logout-btn-container { padding: 30px 20px; text-align: center; }
        .logout-btn { 
            display: inline-block; width: 220px; padding: 12px; border: 2px solid red; 
            background: white; color: red; border-radius: 30px; font-weight: bold; cursor: pointer; 
        }

        footer { position: fixed; bottom: 0; width: 100%; background-color: var(--footer-bg); border-top: 4px solid var(--main-blue); display: flex; padding: 8px 0; }
        .nav-item { flex: 1; text-align: center; text-decoration: none; color: var(--text-gray); font-size: 0.7rem; }
        .nav-item.active { color: var(--main-blue); }
        .nav-item img { width: 30px; height: 30px; display: block; margin: 0 auto 2px; }
    </style>
</head>
<body>

    <header><div class="user-badge">ゲストさん</div></header>

    <main>
        <section id="home" class="page-section active">
            <div class="home-container" id="home-content">
                <div style="text-align:center; padding:50px;">同期中...</div>
            </div>
        </section>
        <section id="league" class="page-section">
            <div class="sub-nav-container" id="nav-league">
                <button class="sub-tab" onclick="moveSlider('league', 0)">予想提出</button>
                <button class="sub-tab" onclick="moveSlider('league', 1)">予選参加希望</button>
                <span class="slider"></span>
            </div>
            <div id="league-content" style="padding:20px; text-align:center;">League</div>
        </section>
        <section id="data" class="page-section">
            <div class="sub-nav-container" id="nav-data">
                <button class="sub-tab" onclick="moveSlider('data', 0)">8週統計</button>
                <button class="sub-tab" onclick="moveSlider('data', 1)">8週掲載順</button>
                <button class="sub-tab" onclick="moveSlider('data', 2)">みんなの予想</button>
                <span class="slider"></span>
            </div>
            <div id="data-content" style="padding:20px; text-align:center;">Data</div>
        </section>
        <section id="qa" class="page-section">
            <div class="sub-nav-container" id="nav-qa">
                <button class="sub-tab" onclick="moveSlider('qa', 0)">問い合わせ</button>
                <button class="sub-tab" onclick="moveSlider('qa', 1)">履歴</button>
                <span class="slider"></span>
            </div>
            <div id="qa-content" style="padding:15px;"></div>
        </section>
        <section id="mypage" class="page-section"><div id="mypage-container"></div></section>
    </main>

    <footer>
        <a href="#" class="nav-item active" data-type="home" onclick="showMainPage('home', this)"><img src="icon-b-home.svg">Home</a>
        <a href="#" class="nav-item" data-type="league" onclick="showMainPage('league', this)"><img src="icon-g-league.svg">League</a>
        <a href="#" class="nav-item" data-type="data" onclick="showMainPage('data', this)"><img src="icon-g-data.svg">Data</a>
        <a href="#" class="nav-item" data-type="qa" onclick="showMainPage('qa', this)"><img src="icon-g-qa.svg">Q&A</a>
        <a href="#" class="nav-item" data-type="mypage" onclick="showMainPage('mypage', this)"><img src="icon-g-mypage.svg">My Page</a>
    </footer>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxWbCA7gRrqyTr1Ti_CEeB_9fZHbzrC7TFJlYJLTEa2xBVEtleC2vR1NXdLufw3okJj/exec";
        let currentUser = JSON.parse(localStorage.getItem('jump_user')) || null;
        let mypageView = currentUser ? 'dashboard' : 'login';
        
        let activeSubTabs = { league: 0, data: 0, qa: 0 };
        let cachedInquiryHistory = null;

        function showMainPage(pageId, element) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                const type = item.getAttribute('data-type');
                item.querySelector('img').src = `icon-g-${type}.svg`;
            });
            element.classList.add('active');
            const activeType = element.getAttribute('data-type');
            element.querySelector('img').src = `icon-b-${activeType}.svg`;
            
            if(pageId === 'home') initHome();
            if(pageId === 'league') moveSlider('league', activeSubTabs.league);
            if(pageId === 'data') moveSlider('data', activeSubTabs.data);
            if(pageId === 'qa') moveSlider('qa', activeSubTabs.qa);
            if(pageId === 'mypage') renderMypage();
            updateHeader();
        }

        async function initHome() {
            const container = document.getElementById('home-content');
            const userId = currentUser ? currentUser.id : null;
            try {
                const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getHomeData", userId }) });
                const res = await response.json();
                const issueDisplay = formatJumpId(res.issueId);
                let html = `<div class="notice-card"><div class="notice-title">📢 お知らせ</div><div class="notice-content">${res.notice || '現在お知らせはありません。'}</div></div>
                    <div class="status-card"><div class="status-header">現在のステータス</div>
                    <div class="status-row"><span class="status-label">募集中の号</span><span class="status-value">${issueDisplay}</span></div>`;
                if (userId) {
                    html += `<div class="status-row"><span class="status-label">予想提出</span><span class="status-value ${res.isSubmitted ? 'ok' : 'ng'}">${res.isSubmitted ? '提出済み' : '未提出'}</span></div>`;
                    if (res.showEventStatus) {
                        html += `<div class="status-row"><span class="status-label">予選参加希望</span><span class="status-value ${res.isParticipating ? 'ok' : 'ng'}">${res.isParticipating ? '参加中' : '未参加'}</span></div>`;
                    }
                } else {
                    html += `<div style="text-align:center; font-size:0.8rem; color:#888; margin-top:10px;">ログインすると提出状況が表示されます</div>`;
                }
                html += `</div>`;
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<div style="text-align:center; padding:20px;">同期に失敗しました</div>`;
            }
        }

        function formatJumpId(id) {
            if(!id || !id.startsWith('WJ_')) return '未設定';
            const num = id.replace('WJ_', '');
            const year = num.substring(0, 4);
            const issueStr = num.substring(4, 6);
            const issue = parseInt(issueStr, 10);
            const merger = num.substring(6, 8);
            return merger === "00" ? `${year}年${issue}号` : `${year}年${issue}/${parseInt(merger, 10)}合併号`;
        }

        function moveSlider(sectionId, index) {
            const container = document.getElementById(`nav-${sectionId}`);
            if (!container) return;
            activeSubTabs[sectionId] = index;
            const tabs = container.getElementsByClassName('sub-tab');
            const slider = container.querySelector('.slider');
            const tabWidth = (container.offsetWidth - 20) / tabs.length;
            slider.style.width = `${tabWidth}px`;
            slider.style.left = `${(tabWidth * index) + 10}px`;
            for (let t of tabs) t.classList.remove('active');
            tabs[index].classList.add('active');
            if(sectionId === 'qa') renderQAContent(index);
        }

        // --- Q&A 制御 ---
        function renderQAContent(index) {
            const container = document.getElementById('qa-content');
            if (index === 0) {
                container.innerHTML = `
                    <div class="auth-container" style="padding:0; gap:10px;">
                        <p style="text-align:left; font-size:0.9rem; margin:10px 0 5px;">要件を選択してください</p>
                        <select id="qa-category">
                            <option value="不具合の報告">不具合の報告</option>
                            <option value="サイトの使用方法について">サイトの使用方法について</option>
                            <option value="その他">その他</option>
                        </select>
                        <textarea id="qa-body" placeholder="内容を入力してください" style="height:150px;"></textarea>
                        <button class="primary-btn" id="btn-qa-send" onclick="sendInquiry()">
                            <div class="spinner"></div> <span>送信する</span>
                        </button>
                    </div>`;
            } else if (index === 1) {
                if (cachedInquiryHistory) displayInquiryHistory();
                else loadInquiryHistory();
            }
        }

        async function sendInquiry() {
            if(!currentUser) return alert("ログインが必要です");
            const category = document.getElementById('qa-category').value;
            const body = document.getElementById('qa-body').value;
            if(!body) return alert("内容を入力してください");
            setLoading('btn-qa-send', true);
            try {
                const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "sendInquiry", userId: currentUser.id, category, content: body }) });
                const res = await response.json();
                if(res.success) {
                    alert("送信が完了しました");
                    document.getElementById('qa-body').value = "";
                    cachedInquiryHistory = null;
                } else { alert("失敗しました"); }
            } catch (e) { alert("エラー"); }
            setLoading('btn-qa-send', false);
        }

        async function loadInquiryHistory() {
            document.getElementById('qa-content').innerHTML = '<div style="text-align:center; padding:20px;">履歴を読み込み中...</div>';
            try {
                const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getInquiryHistory" }) });
                cachedInquiryHistory = await response.json();
                displayInquiryHistory();
            } catch (e) { document.getElementById('qa-content').innerHTML = '読み込み失敗'; }
        }

        function displayInquiryHistory() {
            const container = document.getElementById('qa-content');
            if(!cachedInquiryHistory || cachedInquiryHistory.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">履歴はありません</div>';
                return;
            }
            let html = '<div style="display:flex; flex-direction:column; gap:10px;">';
            cachedInquiryHistory.forEach((item, idx) => {
                const statusClass = item.answer ? 'ok' : 'ng';
                const statusText = item.answer ? '回答済み' : '未回答';
                html += `
                    <div class="status-card" style="padding:15px; cursor:pointer;" onclick="showInquiryDetail(${idx})">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span style="font-weight:bold; font-size:0.85rem; color:var(--main-blue);">${item.category}</span>
                            <span style="font-size:0.75rem; color:#888;">${item.timestamp}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:0.85rem; color:#333; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70%;">${item.content}</span>
                            <span class="status-value ${statusClass}" style="font-size:0.75rem;">${statusText}</span>
                        </div>
                    </div>`;
            });
            container.innerHTML = html + '</div>';
        }

        function showInquiryDetail(idx) {
            const item = cachedInquiryHistory[idx];
            const container = document.getElementById('qa-content');
            container.innerHTML = `
                <div style="padding: 10px;">
                    <h3 style="margin-top:0;">問い合わせ詳細</h3>
                    <div class="status-card" style="padding:15px; background:#f9f9f9;">
                        <p style="font-size:0.8rem; color:#888; margin:0 0 5px;">【要件】 ${item.category}</p>
                        <p style="font-size:0.9rem; font-weight:bold; margin:0 0 15px; white-space:pre-wrap;">${item.content}</p>
                        <div style="border-top:1px solid #eee; padding-top:15px;">
                            <p style="font-size:0.8rem; color:var(--main-blue); margin:0 0 5px;">【回答】</p>
                            <p style="font-size:0.9rem; color:#333; white-space:pre-wrap;">${item.answer || '回答をお待ちください。'}</p>
                        </div>
                    </div>
                    <div class="auth-sub-links"><span onclick="displayInquiryHistory()">履歴一覧に戻る</span></div>
                </div>`;
        }

        // --- ユーザー認証 & MyPage ---
        function updateHeader() {
            document.querySelector('.user-badge').innerText = currentUser ? `${currentUser.name}さん` : 'ゲストさん';
        }

        function renderMypage() {
            const container = document.getElementById('mypage-container');
            if (mypageView === 'login') {
                container.innerHTML = `
                    <div class="auth-container">
                        <input type="text" id="l-name" placeholder="ユーザー名">
                        <input type="password" id="l-pw" placeholder="パスワード">
                        <div class="pw-toggle-area"><input type="checkbox" onchange="togglePw('l-pw')"> パスワードを表示</div>
                        <button class="primary-btn" id="btn-login" onclick="login()"><div class="spinner"></div> <span>ログイン</span></button>
                        <div class="auth-sub-links"><span onclick="mypageView='signup';renderMypage()">新規登録はこちら</span><span onclick="mypageView='reset';renderMypage()">パスワードを忘れた方はこちら</span></div>
                    </div>`;
            } else if (mypageView === 'signup') {
                container.innerHTML = `
                    <div class="auth-container">
                        <input type="text" id="s-name" placeholder="ユーザー名">
                        <input type="password" id="s-pw" placeholder="パスワード">
                        <input type="password" id="s-pwc" placeholder="パスワード再確認">
                        <div class="pw-toggle-area"><input type="checkbox" onchange="togglePw('s-pw');togglePw('s-pwc')"> パスワードを表示</div>
                        <input type="text" id="s-key" placeholder="秘密のキーワード">
                        <button class="primary-btn" id="btn-signup" onclick="signup()"><div class="spinner"></div> <span>新規登録</span></button>
                        <div class="auth-sub-links"><span onclick="mypageView='login';renderMypage()">戻る</span></div>
                    </div>`;
            } else if (mypageView === 'reset') {
                container.innerHTML = `
                    <div class="auth-container">
                        <input type="text" id="r-name" placeholder="ユーザー名">
                        <input type="text" id="r-key" placeholder="秘密のキーワード">
                        <input type="password" id="r-pw" placeholder="新パスワード">
                        <input type="password" id="r-pwc" placeholder="新パスワード再確認">
                        <div class="pw-toggle-area"><input type="checkbox" onchange="togglePw('r-pw');togglePw('r-pwc')"> パスワードを表示</div>
                        <button class="primary-btn" id="btn-reset" onclick="resetPw()"><div class="spinner"></div> <span>更新</span></button>
                        <div class="auth-sub-links"><span onclick="mypageView='login';renderMypage()">戻る</span></div>
                    </div>`;
            } else if (mypageView === 'dashboard') {
                container.innerHTML = `
                    <div class="group-label">ユーザー情報</div>
                    <div class="list-item no-arrow">ユーザー名 <span style="font-size:0.9rem; color:#888;">${currentUser.name}</span></div>
                    <div class="list-item no-arrow">ユーザーID <span style="font-size:0.9rem; color:#888;">${currentUser.id}</span></div>
                    <div class="list-item" onclick="mypageView='edit_pass';renderMypage()">パスワード <span>＞</span></div>
                    <div class="list-item" onclick="mypageView='edit_key';renderMypage()">秘密のキーワード <span>＞</span></div>
                    <div class="group-label">個人成績</div>
                    <div class="list-item" onclick="alert('成績画面は後ほど！')">過去の成績 <span>＞</span></div>
                    <div class="logout-btn-container"><button class="logout-btn" onclick="logout()">ログアウト</button></div>`;
            } else if (mypageView.startsWith('edit_')) {
                renderEditView(container);
            }
        }

        function renderEditView(container) {
            const type = mypageView.replace('edit_', '');
            let title = "", inputHtml = "";
            if (type === 'pass') {
                title = "パスワードの変更";
                inputHtml = `<input type="password" id="new-val" placeholder="新しいパスワード">
                    <input type="password" id="new-val-confirm" placeholder="パスワード再確認">
                    <div class="pw-toggle-area"><input type="checkbox" onchange="togglePw('new-val');togglePw('new-val-confirm')"> パスワードを表示</div>`;
            } else if (type === 'key') {
                title = "秘密のキーワードの変更";
                inputHtml = `<input type="text" id="new-val" placeholder="新しい秘密のキーワード">`;
            }
            container.innerHTML = `<div style="padding: 20px;"><h3 style="margin-top:0;">${title}</h3>
                <div class="auth-container" style="padding:0;">${inputHtml}
                <button class="primary-btn" id="btn-update" onclick="updateInfo('${type}')"><div class="spinner"></div> <span>変更を保存する</span></button>
                <div class="auth-sub-links"><span onclick="mypageView='dashboard';renderMypage()">キャンセル</span></div></div></div>`;
        }

        function togglePw(id) { const el = document.getElementById(id); if(el) el.type = el.type === 'password' ? 'text' : 'password'; }
        async function hash(pw) {
            const msg = new TextEncoder().encode(pw);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msg);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId); if(!btn) return;
            const spinner = btn.querySelector('.spinner'); const text = btn.querySelector('span');
            btn.disabled = isLoading; spinner.style.display = isLoading ? 'block' : 'none'; text.style.opacity = isLoading ? '0.5' : '1';
        }

        async function login() {
            const name = document.getElementById('l-name').value;
            const passInput = document.getElementById('l-pw').value;
            if(!name || !passInput) return alert("入力してください");
            setLoading('btn-login', true);
            const hashedPw = await hash(passInput);
            fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "login", name, pw: hashedPw }) })
            .then(r => r.json()).then(res => {
                if(res.success) {
                    currentUser = { name: res.name, id: res.id };
                    localStorage.setItem('jump_user', JSON.stringify(currentUser));
                    mypageView = 'dashboard'; renderMypage(); updateHeader(); initHome();
                } else { alert("失敗しました"); }
            }).finally(() => setLoading('btn-login', false));
        }

        async function signup() {
            const name = document.getElementById('s-name').value;
            const pwRaw = document.getElementById('s-pw').value;
            const pwcRaw = document.getElementById('s-pwc').value;
            const key = document.getElementById('s-key').value;
            if(!name || !pwRaw || !key) return alert("すべて入力してください");
            if(pwRaw !== pwcRaw) return alert("一致しません");
            setLoading('btn-signup', true);
            const hashed = await hash(pwRaw);
            fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "signup", name, pw: hashed, key }) })
            .then(r => r.json()).then(res => {
                if(res.success) { alert("登録完了! ID: " + res.id); mypageView = 'login'; renderMypage(); }
                else { alert(res.message); }
            }).finally(() => setLoading('btn-signup', false));
        }

        async function resetPw() {
            const name = document.getElementById('r-name').value;
            const key = document.getElementById('r-key').value;
            const pwRaw = document.getElementById('r-pw').value;
            const pwcRaw = document.getElementById('r-pwc').value;
            if(pwRaw !== pwcRaw) return alert("一致しません");
            setLoading('btn-reset', true);
            const hashed = await hash(pwRaw);
            fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "reset", name, key, pw: hashed }) })
            .then(r => r.json()).then(res => {
                if(res.success) { alert("更新完了"); mypageView = 'login'; renderMypage(); }
                else { alert("情報が正しくありません"); }
            }).finally(() => setLoading('btn-reset', false));
        }

        async function updateInfo(type) {
            const val = document.getElementById('new-val').value;
            if(!val) return alert("入力してください");
            let payload = { action: "update", id: currentUser.id, type, value: val };
            if(type === 'pass') {
                const conf = document.getElementById('new-val-confirm').value;
                if(val !== conf) return alert("一致しません");
                payload.value = await hash(val);
            }
            setLoading('btn-update', true);
            fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) })
            .then(r => r.json()).then(res => {
                if(res.success) { alert("更新しました"); mypageView = 'dashboard'; renderMypage(); }
                else { alert("失敗しました"); }
            }).finally(() => setLoading('btn-update', false));
        }

        function logout() { localStorage.removeItem('jump_user'); currentUser = null; mypageView = 'login'; renderMypage(); updateHeader(); initHome(); }

        window.onload = () => { 
            currentUser = JSON.parse(localStorage.getItem('jump_user')) || null;
            updateHeader(); initHome(); renderMypage(); 
            moveSlider('league', 0);
            moveSlider('data', 0);
            moveSlider('qa', 0);
        };
    </script>
</body>
</html>
