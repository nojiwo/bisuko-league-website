<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジャンプ掲載順予想</title>
    <style>
        :root {
            --main-blue: #007bff;
            --header-blue: #007bff;
            --footer-bg: #2d2d2d;
            --bg-gray: #e9e9f0;
            --text-gray: #888;
            --border-gray: #ccc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-gray);
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ヘッダーエリア */
        header {
            background-color: var(--header-blue);
            padding: 20px 0;
            text-align: center;
        }

        .user-badge {
            display: inline-block;
            background-color: #1a3c5e;
            color: white;
            padding: 10px 40px;
            border-radius: 30px;
            border: 2px solid white;
            font-size: 1.2rem;
        }

        /* コンテンツエリア */
        main {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px; /* フッター分 */
        }

        .page-section {
            display: none;
        }

        .page-section.active {
            display: block;
        }

        /* サブナビゲーション（Data, League等） */
        .sub-nav {
            background-color: #333;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        .sub-nav button {
            background: none;
            border: none;
            color: var(--text-gray);
            font-size: 1rem;
            padding: 5px 15px;
            cursor: pointer;
        }

        .sub-nav button.active {
            background-color: var(--main-blue);
            color: white;
            border-radius: 15px;
        }

        /* Home画面のカード */
        .card {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 40px;
            border: 2px solid var(--main-blue);
            text-align: center;
            min-height: 150px;
        }

        .status-card {
            border: 1px solid var(--border-gray);
            background: white;
            margin: 20px;
            border-radius: 40px;
            overflow: hidden;
        }

        .status-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-gray);
        }

        .status-footer {
            padding: 10px;
            font-size: 0.9rem;
        }

        .status-red {
            color: #ff4d4d;
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* My Page リスト */
        .list-group {
            margin-top: 10px;
        }

        .list-label {
            padding-left: 10px;
            color: #666;
            font-size: 0.9rem;
        }

        .list-item {
            background: #d9d9d9;
            border-bottom: 1px solid #999;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            display: block;
            width: 200px;
            margin: 30px auto;
            padding: 15px;
            border: 2px solid red;
            background: white;
            color: red;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
            text-decoration: none;
        }

        /* 下部ナビゲーション */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: var(--footer-bg);
            border-top: 4px solid var(--main-blue);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
        }

        .nav-item {
            text-align: center;
            text-decoration: none;
            color: var(--text-gray);
            font-size: 0.7rem;
            flex: 1;
        }

        .nav-item.active {
            color: var(--main-blue);
        }

        .nav-item img {
            width: 35px;
            height: 35px;
            display: block;
            margin: 0 auto 2px;
        }

        .placeholder-text {
            text-align: center;
            margin-top: 100px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="user-badge">のじを。さん</div>
    </header>

    <main id="content">
        <section id="home" class="page-section active">
            <div class="card" style="background-color: #c9defa;">
                ここに表示するお知らせを表示します。
            </div>
            <div class="status-card">
                <div class="status-header">
                    <div>15号</div>
                    <div class="status-red">未提出</div>
                </div>
                <div class="status-footer">
                    第五回びすこリーグ予選：未参加
                </div>
            </div>
        </section>

        <section id="league" class="page-section">
            <div class="sub-nav">
                <button>予想提出</button>
                <button class="active">予想提出</button>
            </div>
            <div class="placeholder-text">ここでドラッグ＆ドロップの<br>並べ替え選択肢</div>
        </section>

        <section id="data" class="page-section">
            <div class="sub-nav">
                <button class="active">8週統計</button>
                <button>8週掲載順</button>
                <button>みんなの予想</button>
            </div>
            <div class="placeholder-text">ここで8週統計の表</div>
        </section>

        <section id="qa" class="page-section">
            <div class="placeholder-text">ここで問い合せ</div>
        </section>

        <section id="mypage" class="page-section">
            <div class="list-group">
                <div class="list-label">ユーザー情報</div>
                <div class="list-item">ユーザー名 <span>＞</span></div>
                <div class="list-item">ユーザーID <span>＞</span></div>
                <div class="list-item">パスワード <span>＞</span></div>
                <div class="list-item">秘密のキーワード <span>＞</span></div>
            </div>
            <div class="list-group" style="margin-top:20px;">
                <div class="list-label">個人成績</div>
                <div class="list-item">過去の成績 <span>＞</span></div>
            </div>
            <a href="#" class="logout-btn">ログアウト</a>
        </section>
    </main>

    <footer>
        <a href="#" class="nav-item active" onclick="showPage('home')">
            <img src="icon-b-home.svg" alt="Home">
            Home
        </a>
        <a href="#" class="nav-item" onclick="showPage('league')">
            <img src="icon-g-league.svg" alt="League">
            League
        </a>
        <a href="#" class="nav-item" onclick="showPage('data')">
            <img src="icon-g-data.svg" alt="Data">
            Data
        </a>
        <a href="#" class="nav-item" onclick="showPage('qa')">
            <img src="icon-g-q&a.svg" alt="Q&A">
            Q&A
        </a>
        <a href="#" class="nav-item" onclick="showPage('mypage')">
            <img src="icon-g-mypage.svg" alt="My Page">
            My Page
        </a>
    </footer>

    <script>
        // 簡易的なタブ切り替えロジック
        function showPage(pageId) {
            // 全セクションを非表示
            document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
            // 指定セクションを表示
            document.getElementById(pageId).classList.add('active');

            // ナビゲーションのアイコン色切り替え
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                const img = item.querySelector('img');
                const type = item.innerText.toLowerCase().trim().replace(' ', '');
                // q&a の特殊処理
                const fileName = type === 'q&a' ? 'q&a' : type;
                img.src = `icon-g-${fileName}.svg`;
            });

            // クリックされたアイテムをアクティブ化
            const activeItem = event.currentTarget;
            activeItem.classList.add('active');
            const activeType = activeItem.innerText.toLowerCase().trim().replace(' ', '');
            const activeFileName = activeType === 'q&a' ? 'q&a' : activeType;
            activeItem.querySelector('img').src = `icon-b-${activeFileName}.svg`;
        }
    </script>
</body>
</html>
