<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジャンプ掲載順予想</title>
    <style>
        :root {
            --main-blue: #007bff;
            --header-blue: #007bff;
            --footer-bg: #2d2d2d;
            --bg-gray: #e9e9f0;
            --text-gray: #888;
            --border-gray: #ccc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: var(--bg-gray);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ヘッダー */
        header {
            background-color: var(--header-blue);
            padding: 20px 0;
            text-align: center;
            flex-shrink: 0;
        }
        .user-badge {
            display: inline-block;
            background-color: #1a3c5e;
            color: white;
            padding: 8px 35px;
            border-radius: 30px;
            border: 2px solid white;
        }

        /* メインコンテンツ */
        main {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }
        .page-section { display: none; padding-bottom: 80px; }
        .page-section.active { display: block; }

        /* --- サブタブ（スライド・カプセル型） --- */
        .sub-nav-container {
            background-color: #333;
            position: relative;
            display: flex;
            height: 54px; /* 少し高さを調整 */
            padding: 0 10px; /* 左右に少し余裕を */
            align-items: center;
        }
        .sub-tab {
            flex: 1;
            color: var(--text-gray);
            border: none;
            background: none;
            font-size: 0.9rem;
            z-index: 2;
            cursor: pointer;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .sub-tab.active { color: white; }

        /* スライドするカプセル型の青背景 */
        .slider {
            position: absolute;
            height: 34px; /* タブより少し小さくして浮いている感を出す */
            background-color: var(--main-blue);
            border-radius: 25px; /* 左右を半円に */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        /* --- Home画面 --- */
        .card {
            background: #c9defa;
            margin: 20px;
            padding: 40px 20px;
            border-radius: 40px;
            border: 2px solid var(--main-blue);
            text-align: center;
        }
        .status-card {
            border: 1px solid var(--border-gray);
            background: white;
            margin: 20px;
            border-radius: 40px;
            text-align: center;
            overflow: hidden;
        }
        .status-header { padding: 25px; border-bottom: 1px solid var(--border-gray); }
        .status-red { color: #ff4d4d; font-size: 1.6rem; font-weight: bold; margin-top: 5px;}
        .status-footer { padding: 12px; font-size: 0.85rem; color: #333; }

        /* --- My Page --- */
        .list-item {
            background: #d9d9d9;
            border-bottom: 1px solid #aaa;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* --- フッターナビ --- */
        footer {
            position: fixed;
            bottom: 0; width: 100%;
            background-color: var(--footer-bg);
            border-top: 4px solid var(--main-blue);
            display: flex;
            padding: 8px 0;
        }
        .nav-item {
            flex: 1; text-align: center; text-decoration: none;
            color: var(--text-gray); font-size: 0.7rem;
        }
        .nav-item.active { color: var(--main-blue); }
        .nav-item img { width: 30px; height: 30px; display: block; margin: 0 auto 2px; }

        .placeholder-text { text-align: center; margin-top: 50px; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="user-badge">のじを。さん</div>
    </header>

    <main>
        <section id="home" class="page-section active">
            <div class="card">ここに表示するお知らせを表示します。</div>
            <div class="status-card">
                <div class="status-header">
                    <div>15号</div>
                    <div class="status-red">未提出</div>
                </div>
                <div class="status-footer">第五回びすこリーグ予選：未参加</div>
            </div>
        </section>

        <section id="league" class="page-section">
            <div class="sub-nav-container" id="nav-league">
                <button class="sub-tab" onclick="moveSlider('league', 0)">予想提出</button>
                <button class="sub-tab active" onclick="moveSlider('league', 1)">予想提出</button>
                <span class="slider"></span>
            </div>
            <div id="league-content" class="placeholder-text">ここでドラッグ＆ドロップの並べ替え</div>
        </section>

        <section id="data" class="page-section">
            <div class="sub-nav-container" id="nav-data">
                <button class="sub-tab active" onclick="moveSlider('data', 0)">8週統計</button>
                <button class="sub-tab" onclick="moveSlider('data', 1)">8週掲載順</button>
                <button class="sub-tab" onclick="moveSlider('data', 2)">みんなの予想</button>
                <span class="slider"></span>
            </div>
            <div id="data-content" class="placeholder-text">ここで8週統計の表</div>
        </section>

        <section id="qa" class="page-section">
            <div class="placeholder-text">ここで問い合せ</div>
        </section>

        <section id="mypage" class="page-section">
            <div style="padding: 15px 10px 5px; font-size: 0.9rem; color:#666;">ユーザー情報</div>
            <div class="list-item">ユーザー名 <span>＞</span></div>
            <div class="list-item">ユーザーID <span>＞</span></div>
            <div class="list-item">パスワード <span>＞</span></div>
            <div class="list-item">秘密のキーワード <span>＞</span></div>
            <div style="padding: 20px 10px 5px; font-size: 0.9rem; color:#666;">個人成績</div>
            <div class="list-item">過去の成績 <span>＞</span></div>
            <button style="display:block; width:220px; margin:30px auto; padding:12px; border:2px solid red; border-radius:30px; color:red; background:white; font-weight:bold;">ログアウト</button>
        </section>
    </main>

    <footer>
        <a href="#" class="nav-item active" onclick="showMainPage('home', this)">
            <img src="icon-b-home.svg" alt="Home">Home
        </a>
        <a href="#" class="nav-item" onclick="showMainPage('league', this)">
            <img src="icon-g-league.svg" alt="League">League
        </a>
        <a href="#" class="nav-item" onclick="showMainPage('data', this)">
            <img src="icon-g-data.svg" alt="Data">Data
        </a>
        <a href="#" class="nav-item" onclick="showMainPage('qa', this)">
            <img src="icon-g-q&a.svg" alt="Q&A">Q&A
        </a>
        <a href="#" class="nav-item" onclick="showMainPage('mypage', this)">
            <img src="icon-g-mypage.svg" alt="My Page">My Page
        </a>
    </footer>

    <script>
        function moveSlider(sectionId, index) {
            const container = document.getElementById(`nav-${sectionId}`);
            const tabs = container.getElementsByClassName('sub-tab');
            const slider = container.querySelector('.slider');
            
            for (let tab of tabs) tab.classList.remove('active');
            tabs[index].classList.add('active');

            // スライダーの移動計算
            // コンテナ自体のpadding(左右10px)を考慮
            const containerPadding = 10;
            const availableWidth = container.offsetWidth - (containerPadding * 2);
            const tabWidth = availableWidth / tabs.length;
            
            // スライダーの幅を少し小さく見せるための微調整（文字の長さに合わせる感じ）
            slider.style.width = `${tabWidth}px`;
            slider.style.left = `${(tabWidth * index) + containerPadding}px`;

            const content = document.getElementById(`${sectionId}-content`);
            if(sectionId === 'data') {
                const labels = ['ここで8週統計の表', 'ここで8週掲載順の表', 'ここでみんなの予想の表'];
                content.innerText = labels[index];
            } else if(sectionId === 'league') {
                content.innerText = index === 0 ? 'ここで予選参加可否のボタン' : 'ここでドラッグ＆ドロップの並べ替え';
            }
        }

        function showMainPage(pageId, element) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                const type = item.innerText.toLowerCase().trim().replace(' ', '');
                const fileName = type === 'q&a' ? 'q&a' : type;
                item.querySelector('img').src = `icon-g-${fileName}.svg`;
            });

            element.classList.add('active');
            const activeType = element.innerText.toLowerCase().trim().replace(' ', '');
            const activeFileName = activeType === 'q&a' ? 'q&a' : activeType;
            element.querySelector('img').src = `icon-b-${activeFileName}.svg`;

            // 切り替え時にスライダーを再描画（レンダリング後の幅を取得するため少し遅延）
            setTimeout(() => {
                if(pageId === 'league') moveSlider('league', 1);
                if(pageId === 'data') moveSlider('data', 0);
            }, 10);
        }

        window.onload = () => {
            moveSlider('league', 1);
            moveSlider('data', 0);
        };
        
        // 画面リサイズ時にもスライダー位置を調整
        window.onresize = () => {
            if(document.getElementById('league').classList.contains('active')) moveSlider('league', 1);
            if(document.getElementById('data').classList.contains('active')) moveSlider('data', 0);
        };
    </script>
</body>
</html>
