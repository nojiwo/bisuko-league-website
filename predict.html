<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジャンプ掲載順予想</title>
    <style>
        :root {
            --main-blue: #007bff;
            --header-blue: #007bff;
            --footer-bg: #2d2d2d;
            --bg-gray: #e9e9f0;
            --text-gray: #888;
            --border-gray: #ccc;
        }

        body {
            margin: 0; padding: 0;
            font-family: sans-serif;
            background-color: var(--bg-gray);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* ヘッダー */
        header { background-color: var(--header-blue); padding: 20px 0; text-align: center; flex-shrink: 0; }
        .user-badge {
            display: inline-block; background-color: #1a3c5e; color: white;
            padding: 8px 35px; border-radius: 30px; border: 2px solid white;
        }

        /* メイン */
        main { flex: 1; overflow-y: auto; position: relative; }
        .page-section { display: none; padding-bottom: 80px; }
        .page-section.active { display: block; }

        /* サブタブ共通スタイル */
        .sub-nav-container {
            background-color: #333; position: relative; display: flex;
            height: 60px; padding: 0 10px; align-items: center; border-bottom: 2px solid #555;
        }
        .sub-tab {
            flex: 1; color: var(--text-gray); border: none; background: none;
            font-size: 0.9rem; z-index: 2; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 100%;
        }
        .sub-tab.active { color: white; font-weight: bold; }
        .slider {
            position: absolute; height: 34px; background-color: var(--main-blue);
            border-radius: 25px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1;
        }
        .slider::after {
            content: ""; position: absolute; bottom: -13px; left: 0; width: 100%;
            height: 4px; background-color: var(--main-blue); border-radius: 2px 2px 0 0;
        }

        /* --- 認証・編集フォーム共通 --- */
        .auth-container { padding: 20px; display: flex; flex-direction: column; gap: 15px; text-align: center; }
        .auth-container input { padding: 12px; border-radius: 8px; border: 1px solid var(--border-gray); font-size: 1rem; width: 100%; box-sizing: border-box; }
        
        .pw-toggle-area { text-align: left; font-size: 0.8rem; color: #555; display: flex; align-items: center; gap: 8px; margin-top: -5px; }
        .pw-toggle-area input[type="checkbox"] { width: 18px; height: 18px; margin: 0; cursor: pointer; }

        .primary-btn { 
            background: var(--main-blue); color: white; border: none; padding: 14px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .primary-btn:disabled { background: #888; cursor: not-allowed; }

        .spinner {
            width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff; border-radius: 50%;
            animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .auth-sub-links { margin-top: 15px; display: flex; flex-direction: column; gap: 12px; font-size: 0.85rem; color: var(--main-blue); }
        .auth-sub-links span { cursor: pointer; text-decoration: underline; }
        .notice-box { text-align: left; background: white; margin: 15px; padding: 15px; border-radius: 10px; font-size: 0.8rem; border-left: 5px solid gold; line-height: 1.5; }

        /* --- ログイン後のマイページ --- */
        .group-label { padding: 15px 15px 5px; font-size: 0.9rem; color: #333; font-weight: bold; }
        .list-item { background: #d9d9d9; border-bottom: 1px solid #bbb; padding: 18px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .list-item.no-arrow { cursor: default; }
        .list-item span { color: #666; font-size: 1.2rem; font-weight: bold; }
        .logout-btn-container { padding: 30px 20px; text-align: center; }
        .logout-btn { 
            display: inline-block; width: 220px; padding: 12px; border: 2px solid red; 
            background: white; color: red; border-radius: 30px; font-weight: bold; cursor: pointer; 
        }

        footer { position: fixed; bottom: 0; width: 100%; background-color: var(--footer-bg); border-top: 4px solid var(--main-blue); display: flex; padding: 8px 0; }
        .nav-item { flex: 1; text-align: center; text-decoration: none; color: var(--text-gray); font-size: 0.7rem; }
        .nav-item.active { color: var(--main-blue); }
        .nav-item img { width: 30px; height: 30px; display: block; margin: 0 auto 2px; }
    </style>
</head>
<body>

    <header><div class="user-badge">ゲストさん</div></header>

    <main>
        <section id="home" class="page-section active"><div style="text-align:center; margin-top:100px;">Home</div></section>
        <section id="league" class="page-section">
            <div class="sub-nav-container" id="nav-league">
                <button class="sub-tab active" onclick="moveSlider('league', 0)">予想提出</button>
                <button class="sub-tab" onclick="moveSlider('league', 1)">予選参加希望</button>
                <span class="slider"></span>
            </div>
            <div id="league-content" style="padding:20px; text-align:center;">League</div>
        </section>
        <section id="data" class="page-section">
            <div class="sub-nav-container" id="nav-data">
                <button class="sub-tab active" onclick="moveSlider('data', 0)">8週統計</button>
                <button class="sub-tab" onclick="moveSlider('data', 1)">8週掲載順</button>
                <button class="sub-tab" onclick="moveSlider('data', 2)">みんなの予想</button>
                <span class="slider"></span>
            </div>
            <div id="data-content" style="padding:20px; text-align:center;">Data</div>
        </section>
        <section id="qa" class="page-section"><div style="padding:50px; text-align:center;">問い合せ</div></section>
        <section id="mypage" class="page-section"><div id="mypage-container"></div></section>
    </main>

    <footer>
        <a href="#" class="nav-item active" onclick="showMainPage('home', this)"><img src="icon-b-home.svg">Home</a>
        <a href="#" class="nav-item" onclick="showMainPage('league', this)"><img src="icon-g-league.svg">League</a>
        <a href="#" class="nav-item" onclick="showMainPage('data', this)"><img src="icon-g-data.svg">Data</a>
        <a href="#" class="nav-item" onclick="showMainPage('qa', this)"><img src="icon-g-q&a.svg">Q&A</a>
        <a href="#" class="nav-item" onclick="showMainPage('mypage', this)"><img src="icon-g-mypage.svg">My Page</a>
    </footer>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxWbCA7gRrqyTr1Ti_CEeB_9fZHbzrC7TFJlYJLTEa2xBVEtleC2vR1NXdLufw3okJj/exec";
        let currentUser = JSON.parse(localStorage.getItem('jump_user')) || null;
        let mypageView = currentUser ? 'dashboard' : 'login';

        function showMainPage(pageId, element) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                const type = item.innerText.toLowerCase().trim().replace(' ', '');
                item.querySelector('img').src = `icon-g-${type === 'q&a' ? 'q&a' : type}.svg`;
            });
            element.classList.add('active');
            const activeType = element.innerText.toLowerCase().trim().replace(' ', '');
            element.querySelector('img').src = `icon-b-${activeType === 'q&a' ? 'q&a' : activeType}.svg`;
            if(pageId === 'league') moveSlider('league', 0);
            if(pageId === 'data') moveSlider('data', 0);
            if(pageId === 'mypage') renderMypage();
            updateHeader();
        }

        function moveSlider(sectionId, index) {
            const container = document.getElementById(`nav-${sectionId}`);
            if (!container) return;
            const tabs = container.getElementsByClassName('sub-tab');
            const slider = container.querySelector('.slider');
            const tabWidth = (container.offsetWidth - 20) / tabs.length;
            slider.style.width = `${tabWidth}px`;
            slider.style.left = `${(tabWidth * index) + 10}px`;
            for (let t of tabs) t.classList.remove('active');
            tabs[index].classList.add('active');
        }

        function updateHeader() {
            document.querySelector('.user-badge').innerText = currentUser ? `${currentUser.name}さん` : 'ゲストさん';
        }

        function renderMypage() {
            const container = document.getElementById('mypage-container');
            
            // ログイン画面
            if (mypageView === 'login') {
                container.innerHTML = `
                    <div class="auth-container">
                        <input type="text" id="l-name" placeholder="ユーザー名">
                        <input type="password" id="l-pw" placeholder="パスワード">
                        <div class="pw-toggle-area"><input type="checkbox" onchange="togglePw('l-pw')"> パスワードを表示</div>
                        <button class="primary-btn" id="btn-login" onclick="login()">
                            <div class="spinner"></div> <span>ログイン</span>
                        </button>
                        <div class="auth-sub-links">
                            <span onclick="mypageView='signup';renderMypage()">新規登録はこちら</span>
                            <span onclick="mypageView='reset';renderMypage()">パスワードを忘れた方はこちら</span>
                        </div>
                    </div>`;
            } 
            // 新規登録画面
            else if (mypageView === 'signup') {
                container.innerHTML = `
                    <div class="notice-box">
                        <b>ユーザー名について:</b><br>8文字以内で設定してください。<br><br>
                        <b>秘密のキーワードについて:</b><br>パスワード再設定時に使用します。
                    </div>
                    <div class="auth-container">
                        <input type="text" id="s-name" placeholder="ユーザー名">
                        <input type="password" id="s-pw" placeholder="パスワード">
                        <input type="password" id="s-pwc" placeholder="パスワード再確認">
                        <div class="pw-toggle-area"><input type="checkbox" onchange="togglePw('s-pw');togglePw('s-pwc')"> パスワードを表示</div>
                        <input type="text" id="s-key" placeholder="秘密のキーワード">
                        <button class="primary-btn" id="btn-signup" onclick="signup()">
                            <div class="spinner"></div> <span>新規登録</span>
                        </button>
                        <div class="auth-sub-links"><span onclick="mypageView='login';renderMypage()">戻る</span></div>
                    </div>`;
            } 
            // ログイン前パスワードリセット
            else if (mypageView === 'reset') {
                container.innerHTML = `
                    <div class="auth-container">
                        <input type="text" id="r-name" placeholder="ユーザー名">
                        <input type="text" id="r-key" placeholder="秘密のキーワード">
                        <input type="password" id="r-pw" placeholder="新パスワード">
                        <input type="password" id="r-pwc" placeholder="新パスワード再確認">
                        <div class="pw-toggle-area"><input type="checkbox" onchange="togglePw('r-pw');togglePw('r-pwc')"> パスワードを表示</div>
                        <button class="primary-btn" id="btn-reset" onclick="resetPw()">
                            <div class="spinner"></div> <span>パスワード更新</span>
                        </button>
                        <div class="auth-sub-links"><span onclick="mypageView='login';renderMypage()">戻る</span></div>
                    </div>`;
            } 
            // ダッシュボード
            else if (mypageView === 'dashboard') {
                container.innerHTML = `
                    <div class="group-label">ユーザー情報</div>
                    <div class="list-item" onclick="mypageView='edit_name';renderMypage()">ユーザー名 <span>＞</span></div>
                    <div class="list-item no-arrow">ユーザーID <span style="font-size:0.9rem; color:#888;">${currentUser.id}</span></div>
                    <div class="list-item" onclick="mypageView='edit_pass';renderMypage()">パスワード <span>＞</span></div>
                    <div class="list-item" onclick="mypageView='edit_key';renderMypage()">秘密のキーワード <span>＞</span></div>
                    
                    <div class="group-label">個人成績</div>
                    <div class="list-item" onclick="alert('成績画面は後ほど！')">過去の成績 <span>＞</span></div>
                    <div class="logout-btn-container"><button class="logout-btn" onclick="logout()">ログアウト</button></div>`;
            }
            // 編集画面
            else if (mypageView.startsWith('edit_')) {
                renderEditView(container);
            }
        }

        function renderEditView(container) {
            const type = mypageView.replace('edit_', '');
            let title = "", currentLabel = "", inputHtml = "";

            if (type === 'name') {
                title = "ユーザー名の変更";
                currentLabel = `現在のユーザー名: <b>${currentUser.name}</b>`;
                inputHtml = `<input type="text" id="new-val" placeholder="新しいユーザー名">`;
            } else if (type === 'pass') {
                title = "パスワードの変更";
                currentLabel = "現在の設定: <b>********</b>";
                inputHtml = `
                    <input type="password" id="new-val" placeholder="新しいパスワード">
                    <input type="password" id="new-val-confirm" placeholder="パスワード再確認">
                    <div class="pw-toggle-area"><input type="checkbox" onchange="togglePw('new-val');togglePw('new-val-confirm')"> パスワードを表示</div>`;
            } else if (type === 'key') {
                title = "秘密のキーワードの変更";
                currentLabel = "現在のキーワードは非表示です";
                inputHtml = `<input type="text" id="new-val" placeholder="新しい秘密のキーワード">`;
            }

            container.innerHTML = `
                <div style="padding: 20px;">
                    <h3 style="margin-top:0;">${title}</h3>
                    <div style="margin-bottom:20px; font-size:0.9rem; color:#666;">${currentLabel}</div>
                    <div class="auth-container" style="padding:0;">
                        ${inputHtml}
                        <button class="primary-btn" id="btn-update" onclick="updateInfo('${type}')">
                            <div class="spinner"></div> <span>変更を保存する</span>
                        </button>
                        <div class="auth-sub-links"><span onclick="mypageView='dashboard';renderMypage()">キャンセル</span></div>
                    </div>
                </div>`;
        }

        function togglePw(id) {
            const el = document.getElementById(id);
            if(el) el.type = el.type === 'password' ? 'text' : 'password';
        }

        async function hash(pw) {
            const msg = new TextEncoder().encode(pw);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msg);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            if(!btn) return;
            const spinner = btn.querySelector('.spinner');
            const text = btn.querySelector('span');
            btn.disabled = isLoading;
            spinner.style.display = isLoading ? 'block' : 'none';
            text.style.opacity = isLoading ? '0.5' : '1';
        }

        async function login() {
            const name = document.getElementById('l-name').value;
            const passInput = document.getElementById('l-pw').value;
            if(!name || !passInput) return alert("入力してください");
            setLoading('btn-login', true);
            const pw = await hash(passInput);
            fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "login", name, pw }) })
            .then(r => r.json()).then(res => {
                if(res.success) {
                    currentUser = { name: res.name, id: res.id };
                    localStorage.setItem('jump_user', JSON.stringify(currentUser));
                    mypageView = 'dashboard'; renderMypage(); updateHeader();
                } else { alert("失敗しました"); }
            }).finally(() => setLoading('btn-login', false));
        }

        async function signup() {
            const name = document.getElementById('s-name').value;
            const pwRaw = document.getElementById('s-pw').value;
            const pwcRaw = document.getElementById('s-pwc').value;
            const key = document.getElementById('s-key').value;
            if(!name || !pwRaw || !key) return alert("すべて入力してください");
            if(pwRaw !== pwcRaw) return alert("一致しません");
            setLoading('btn-signup', true);
            const hashed = await hash(pwRaw);
            fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "signup", name, pw: hashed, key }) })
            .then(r => r.json()).then(res => {
                if(res.success) { alert("登録完了! ID: " + res.id); mypageView = 'login'; renderMypage(); }
                else { alert(res.message); }
            }).finally(() => setLoading('btn-signup', false));
        }

        async function resetPw() {
            const name = document.getElementById('r-name').value;
            const key = document.getElementById('r-key').value;
            const pwRaw = document.getElementById('r-pw').value;
            const pwcRaw = document.getElementById('r-pwc').value;
            if(pwRaw !== pwcRaw) return alert("一致しません");
            setLoading('btn-reset', true);
            const hashed = await hash(pwRaw);
            fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "reset", name, key, pw: hashed }) })
            .then(r => r.json()).then(res => {
                if(res.success) { alert("更新完了"); mypageView = 'login'; renderMypage(); }
                else { alert("情報が正しくありません"); }
            }).finally(() => setLoading('btn-reset', false));
        }

        async function updateInfo(type) {
            const val = document.getElementById('new-val').value;
            if(!val) return alert("入力してください");
            let payload = { action: "update", id: currentUser.id, type: type, value: val };
            if(type === 'pass') {
                const conf = document.getElementById('new-val-confirm').value;
                if(val !== conf) return alert("一致しません");
                payload.value = await hash(val);
            }
            setLoading('btn-update', true);
            fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) })
            .then(r => r.json()).then(res => {
                if(res.success) {
                    alert("更新しました");
                    if(type === 'name') currentUser.name = val;
                    localStorage.setItem('jump_user', JSON.stringify(currentUser));
                    mypageView = 'dashboard'; renderMypage(); updateHeader();
                } else { alert("失敗しました"); }
            }).finally(() => setLoading('btn-update', false));
        }

        function logout() {
            localStorage.removeItem('jump_user'); currentUser = null; mypageView = 'login'; renderMypage(); updateHeader();
        }

        window.onload = () => { renderMypage(); updateHeader(); };
    </script>
</body>
</html>
